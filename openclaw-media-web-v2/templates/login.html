{% extends "base.html" %}

{% block content %}
<div class="auth-form">
    <h2>🔐 登入</h2>
    <form method="POST">
        <div class="form-group">
            <label>帳號</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>密碼</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">登入</button>
    </form>
    <p>還沒有帳號？<a href="{{ url_for('register') }}">註冊</a></p>
</div>
{% endblock %}
